{% extends "base.html" %}
{% block title %}Scanner – Scotch &amp; Bourbon{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-2xl font-bold text-amber-900">Barcode Scanner</h1>
  <button onclick="deleteReviewed()" class="text-xs text-red-500 hover:underline border border-red-200 px-3 py-1.5 rounded-lg">
    Clear Reviewed
  </button>
</div>

<!-- Scan input -->
<div class="bg-white rounded-xl border border-amber-100 shadow-sm p-5 mb-5">
  <div class="text-sm font-medium text-gray-700 mb-3">Scan or Enter Barcode</div>
  <div class="flex gap-2">
    <input id="upc-input" type="text" placeholder="UPC barcode…" autofocus
      class="flex-1 border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-amber-400"
      onkeydown="if(event.key==='Enter') scanBarcode()"/>
    <button onclick="scanBarcode()" class="bg-amber-800 hover:bg-amber-700 text-white px-4 py-2 text-sm rounded-lg">Lookup</button>
    <button onclick="createBlank()" class="border border-amber-300 text-amber-800 hover:bg-amber-50 px-4 py-2 text-sm rounded-lg">Manual Entry</button>
  </div>
</div>

<!-- Queue -->
<div id="entries-container" class="space-y-4">
  <div class="text-center py-8 text-gray-400" id="loading">Loading queue…</div>
</div>

<!-- Entry template (hidden) -->
<template id="entry-tpl">
  <div class="entry-card bg-white rounded-xl border border-amber-100 shadow-sm p-4">
    <div class="flex items-start gap-4">
      <div class="entry-photos flex gap-2 flex-shrink-0">
        <div class="w-20 h-20 bg-amber-50 rounded-lg flex items-center justify-center text-2xl photo-placeholder">📷</div>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 mb-2">
          <span class="entry-upc text-xs text-gray-400 font-mono"></span>
          <span class="entry-reviewed hidden text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">✓ Reviewed</span>
          <button class="btn-autofill ml-auto text-xs text-amber-600 hover:underline">Autofill ✨</button>
          <button class="btn-delete text-xs text-red-400 hover:text-red-600">✕</button>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
          <div class="col-span-2 sm:col-span-1">
            <label class="text-xs text-gray-400">Brand</label>
            <input class="field-brand w-full border rounded px-2 py-1 text-sm focus:ring-1 focus:ring-amber-400 mt-0.5"/>
          </div>
          <div>
            <label class="text-xs text-gray-400">Name / Expression</label>
            <input class="field-name w-full border rounded px-2 py-1 text-sm focus:ring-1 focus:ring-amber-400 mt-0.5"/>
          </div>
          <div>
            <label class="text-xs text-gray-400">Type</label>
            <select class="field-type w-full border rounded px-2 py-1 text-sm focus:ring-1 focus:ring-amber-400 mt-0.5">
              <option value="">—</option>
              {% for wt in whiskey_types %}
              <option value="{{ wt }}">{{ wt }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="text-xs text-gray-400">Region</label>
            <select class="field-region w-full border rounded px-2 py-1 text-sm focus:ring-1 focus:ring-amber-400 mt-0.5">
              <option value="">—</option>
              {% for r in regions %}
              <option value="{{ r }}">{{ r }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label class="text-xs text-gray-400">Age (yrs)</label>
            <input type="number" class="field-age w-full border rounded px-2 py-1 text-sm focus:ring-1 focus:ring-amber-400 mt-0.5"/>
          </div>
          <div>
            <label class="text-xs text-gray-400">ABV %</label>
            <input type="number" step="0.1" class="field-abv w-full border rounded px-2 py-1 text-sm focus:ring-1 focus:ring-amber-400 mt-0.5"/>
          </div>
          <div>
            <label class="text-xs text-gray-400">Volume ml</label>
            <input type="number" class="field-volume w-full border rounded px-2 py-1 text-sm focus:ring-1 focus:ring-amber-400 mt-0.5"/>
          </div>
        </div>
        <div class="flex gap-2 mt-3">
          <button class="btn-save text-xs bg-amber-100 hover:bg-amber-200 text-amber-800 px-3 py-1.5 rounded-lg">Save</button>
          <button class="btn-photo-add text-xs border border-gray-200 hover:bg-gray-50 px-3 py-1.5 rounded-lg text-gray-600">📷 Add Photo</button>
          <input type="file" class="input-photo hidden" accept="image/*"/>
          <button class="btn-commit text-xs bg-amber-800 hover:bg-amber-700 text-white px-3 py-1.5 rounded-lg ml-auto">✓ Add to Cellar</button>
        </div>
      </div>
    </div>
  </div>
</template>
{% endblock %}

{% block scripts %}
<script>
let entries = [];

async function loadEntries() {
  try {
    entries = await apiFetch('/scanner/entries');
    renderEntries();
  } catch(e) {
    document.getElementById('loading').textContent = 'Failed to load queue.';
  }
}

function renderEntries() {
  const container = document.getElementById('entries-container');
  if (!entries.length) {
    container.innerHTML = '<div class="text-center py-8 text-gray-400">Queue is empty. Scan a barcode to get started.</div>';
    return;
  }
  container.innerHTML = '';
  entries.forEach(e => container.appendChild(buildCard(e)));
}

function buildCard(e) {
  const tpl = document.getElementById('entry-tpl');
  const card = tpl.content.cloneNode(true).querySelector('.entry-card');
  card.id = `entry-${e.id}`;

  card.querySelector('.entry-upc').textContent = e.upc || 'No UPC';
  if (e.is_reviewed) card.querySelector('.entry-reviewed').classList.remove('hidden');

  const fields = {
    brand: '.field-brand', name: '.field-name', age_statement: '.field-age',
    abv: '.field-abv', volume_ml: '.field-volume',
  };
  for (const [k, sel] of Object.entries(fields)) {
    const el = card.querySelector(sel);
    if (el && e[k] != null) el.value = e[k];
  }
  const setSelect = (sel, val) => {
    const el = card.querySelector(sel);
    if (el && val) el.value = val;
  };
  setSelect('.field-type', e.whiskey_type);
  setSelect('.field-region', e.region);

  // Photos
  const photosDiv = card.querySelector('.entry-photos');
  [e.image_path_1, e.image_path_2, e.image_path_3].filter(Boolean).forEach(p => {
    const img = document.createElement('img');
    img.src = `/${p}`;
    img.className = 'w-20 h-20 object-cover rounded-lg border cursor-pointer';
    photosDiv.insertBefore(img, photosDiv.firstChild);
    if (photosDiv.querySelector('.photo-placeholder')) photosDiv.querySelector('.photo-placeholder').remove();
  });

  // Buttons
  card.querySelector('.btn-autofill').onclick = () => autofillEntry(e.id, card);
  card.querySelector('.btn-delete').onclick = () => deleteEntry(e.id, card);
  card.querySelector('.btn-save').onclick = () => saveEntry(e.id, card);
  card.querySelector('.btn-commit').onclick = () => commitEntry(e.id);

  const fileInput = card.querySelector('.input-photo');
  card.querySelector('.btn-photo-add').onclick = () => fileInput.click();
  fileInput.onchange = () => addPhoto(e.id, fileInput, card);

  return card;
}

async function scanBarcode() {
  const upc = document.getElementById('upc-input').value.trim();
  if (!upc) { showToast('Enter a UPC', 'info'); return; }
  try {
    const info = await apiFetch(`/barcode/lookup?upc=${encodeURIComponent(upc)}`);
    const fd = new FormData();
    fd.append('upc', upc);
    if (info.brand) fd.append('brand', info.brand);
    if (info.name)  fd.append('name', info.name);
    if (info.whiskey_type) fd.append('whiskey_type', info.whiskey_type);
    if (info.region) fd.append('region', info.region);
    if (info.age_statement != null) fd.append('age_statement', info.age_statement);
    if (info.abv != null) fd.append('abv', info.abv);
    if (info.volume_ml != null) fd.append('volume_ml', info.volume_ml);
    const entry = await apiFetch('/scanner/entries', {method:'POST', body:fd});
    entries.unshift(entry);
    renderEntries();
    document.getElementById('upc-input').value = '';
    showToast('Scanned!');
  } catch(e) { showToast(e.message, 'error'); }
}

async function createBlank() {
  const fd = new FormData();
  const entry = await apiFetch('/scanner/entries', {method:'POST', body:fd}).catch(e => { showToast(e.message,'error'); return null; });
  if (!entry) return;
  entries.unshift(entry);
  renderEntries();
}

async function autofillEntry(id, card) {
  try {
    const r = await apiFetch(`/scanner/entries/${id}/autofill`, {method:'POST'});
    const p = r.proposed || {};
    const setField = (cls, val) => { const el = card.querySelector(cls); if (el && val != null) el.value = val; };
    setField('.field-brand', p.brand);
    setField('.field-whiskey_type', p.whiskey_type);
    setField('.field-region', p.region);
    setField('.field-age', p.age_statement);
    setField('.field-abv', p.abv);
    setField('.field-volume', p.volume_ml);
    showToast('Autofilled!');
  } catch(e) { showToast(e.message, 'error'); }
}

async function saveEntry(id, card) {
  const get = cls => card.querySelector(cls)?.value || null;
  const body = {
    brand: get('.field-brand'),
    name: get('.field-name'),
    whiskey_type: get('.field-type'),
    region: get('.field-region'),
    age_statement: get('.field-age') ? parseInt(get('.field-age')) : null,
    abv: get('.field-abv') ? parseFloat(get('.field-abv')) : null,
    volume_ml: get('.field-volume') ? parseInt(get('.field-volume')) : null,
  };
  try {
    await apiFetch(`/scanner/entries/${id}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body),
    });
    showToast('Saved');
  } catch(e) { showToast(e.message, 'error'); }
}

async function addPhoto(id, input, card) {
  const fd = new FormData();
  fd.append('photo', input.files[0]);
  try {
    const r = await apiFetch(`/scanner/entries/${id}/add-photo`, {method:'POST', body:fd});
    showToast('Photo added');
    const paths = [r.image_path_1, r.image_path_2, r.image_path_3].filter(Boolean);
    const photosDiv = card.querySelector('.entry-photos');
    const ph = photosDiv.querySelector('.photo-placeholder');
    if (ph) ph.remove();
    const last = paths[paths.length - 1];
    const img = document.createElement('img');
    img.src = `/${last}`;
    img.className = 'w-20 h-20 object-cover rounded-lg border';
    photosDiv.appendChild(img);
  } catch(e) { showToast(e.message, 'error'); }
}

async function commitEntry(id) {
  if (!confirm('Add this to your cellar?')) return;
  try {
    const r = await apiFetch(`/scanner/entries/${id}/commit`, {method:'POST'});
    showToast('Added to cellar!');
    setTimeout(() => location.href = `/bottle/${r.bottle_id}`, 500);
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteEntry(id, card) {
  if (!confirm('Remove this entry?')) return;
  try {
    await apiFetch(`/scanner/entries/${id}`, {method:'DELETE'});
    card.remove();
    entries = entries.filter(e => e.id !== id);
    if (!entries.length) document.getElementById('entries-container').innerHTML =
      '<div class="text-center py-8 text-gray-400">Queue is empty.</div>';
    showToast('Removed');
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteReviewed() {
  if (!confirm('Delete all reviewed entries?')) return;
  try {
    const r = await apiFetch('/scanner/entries/reviewed', {method:'DELETE'});
    showToast(`Deleted ${r.deleted} entries`);
    loadEntries();
  } catch(e) { showToast(e.message, 'error'); }
}

loadEntries();
</script>
{% endblock %}
