<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Scotch &amp; Bourbon</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-5xl mb-2">🥃</div>
      <h1 class="text-2xl font-bold text-amber-900">Scotch &amp; Bourbon</h1>
      <p class="text-gray-500 text-sm mt-1">Your personal whiskey cellar</p>
    </div>

    {% if error %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded px-3 py-2 mb-4">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" required autofocus
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"/>
      </div>
      <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
        <input type="checkbox" name="remember" value="1" class="rounded accent-amber-600"/>
        Remember me for 30 days
      </label>
      <button type="submit"
        class="w-full bg-amber-800 hover:bg-amber-700 text-white font-semibold py-2 rounded-lg transition">
        Sign In
      </button>
    </form>
  </div>
</body>
</html>
