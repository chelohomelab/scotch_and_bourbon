<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Setup – Scotch &amp; Bourbon</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
    <div class="text-center mb-6">
      <div class="text-5xl mb-2">🥃</div>
      <h1 class="text-2xl font-bold text-amber-900">Welcome!</h1>
      <p class="text-gray-500 text-sm mt-1">Create your admin account to get started</p>
    </div>

    {% if request.query_params.get('error') %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded px-3 py-2 mb-4">
      {{ request.query_params.get('error') }}
    </div>
    {% endif %}

    <form method="post" action="/setup" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" required autofocus minlength="3"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"/>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required minlength="8"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"/>
        <p class="text-xs text-gray-400 mt-1">Minimum 8 characters</p>
      </div>
      <button type="submit"
        class="w-full bg-amber-800 hover:bg-amber-700 text-white font-semibold py-2 rounded-lg transition">
        Create Account
      </button>
    </form>
  </div>
</body>
</html>
